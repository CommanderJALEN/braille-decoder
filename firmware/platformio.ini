; PlatformIO Project Configuration File
;
; BrailleDecoder firmware for ESP32
;
; Build: pio run
; Upload: pio run --target upload
; Monitor serial: pio device monitor
;
; The ESP32 connects to Wi-Fi, subscribes to the HiveMQ topic
; 'braille/letter', and lights up the matching Braille dot pattern
; on the 6 LEDs whenever a letter arrives. The OLED displays the
; current letter.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Libraries used by the firmware
lib_deps =
    knolleary/PubSubClient @ ^2.8
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit SSD1306 @ ^2.5.10
    bblanchon/ArduinoJson @ ^7.0.4

build_flags =
    -D CORE_DEBUG_LEVEL=3
